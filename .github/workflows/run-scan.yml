name: "2. Execute Vulnerability Scan"

on:
  workflow_dispatch:
    inputs:
      target_domain:
        description: 'The target domain to scan (e.g., example.com)'
        required: true
        type: string
      severities:
        description: 'Severities to scan for (comma-separated)'
        required: false
        default: 'medium,high,critical'
        type: string
      timeout:
        description: 'Subprocess timeout in seconds'
        required: false
        default: '1800'
        type: string
      max_findings:
        description: 'Max findings for AI triage'
        required: false
        default: '50'
        type: string

jobs:
  execute-scan:
    name: "Run Fargate Scan"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Fetch Pipeline Secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ vars.IDENTITY_ID }}
          oidc-audience: ${{ github.server_url }}/${{ github.repository }}
          env-slug: "prod"
          project-slug: "pipeline-secret-store"
          secret-path: "/bounty-infra"

      - name: Setup OpenTofu Core
        uses: opentofu/setup-opentofu@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch Infrastructure Networking States
        id: infra-outputs
        working-directory: ./infra
        run: |
          set -euo pipefail
          tofu init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}"

          echo "CLUSTER_NAME=$(tofu output -raw ecs_cluster_name)" >> "$GITHUB_ENV"
          echo "SUBNET_ID=$(tofu output -raw subnet_id)" >> "$GITHUB_ENV"
          echo "SG_ID=$(tofu output -raw security_group_id)" >> "$GITHUB_ENV"

      - name: Validate target_domain
        env:
          TARGET_DOMAIN: ${{ inputs.target_domain }}
        run: |
          set -euo pipefail
          # Structural hostname gate only (dotted labels, alnum + hyphen, no
          # leading/trailing hyphen) — RoE/scope enforcement is S1's #7, not this.
          hostname_re='^([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z]{2,63}$'
          if ! [[ "$TARGET_DOMAIN" =~ $hostname_re ]]; then
            echo "::error::target_domain '$TARGET_DOMAIN' is not a valid hostname"
            exit 1
          fi

      - name: Trigger Scan Task & Wait for Completion
        env:
          TARGET_DOMAIN: ${{ inputs.target_domain }}
          SEVERITIES: ${{ inputs.severities }}
          SCAN_TIMEOUT: ${{ inputs.timeout }}
          MAX_FINDINGS: ${{ inputs.max_findings }}
        run: |
          set -euo pipefail
          echo "Triggering scan for $TARGET_DOMAIN..."

          OVERRIDES=$(jq -n \
            --arg domain "$TARGET_DOMAIN" \
            --arg severities "$SEVERITIES" \
            --arg timeout "$SCAN_TIMEOUT" \
            --arg max_findings "$MAX_FINDINGS" \
            '{
              containerOverrides: [
                {
                  name: "scanner-container",
                  # No "python -m bounty_scanner.scanner" prefix here: ECS
                  # containerOverrides.command replaces Docker CMD only, and
                  # the image ENTRYPOINT (src/Dockerfile) already supplies
                  # that prefix. Repeating it here duplicates the module
                  # invocation in the final argv, which argparse rejects.
                  command: [
                    $domain,
                    "--severities", $severities,
                    "--timeout", $timeout,
                    "--max-findings", $max_findings
                  ]
                }
              ]
            }')

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition bounty-scanner-task \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_ID],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" \
            --overrides "$OVERRIDES" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Task launched: $TASK_ARN"
          echo "Waiting for task to complete (this may take a few minutes)..."

          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER_NAME" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Task exited with code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Scanner infrastructure task failed to execute! Check CloudWatch Logs for crash details."
            exit 1
          else
            echo "Scanner task executed successfully! (Security findings, if any, have been exported to S3)."
          fi
