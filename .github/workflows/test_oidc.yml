name: "Test OIDC Authentication"

on:
  workflow_dispatch: # Allows you to trigger this manually

permissions:
  id-token: write # CRITICAL: Required for OIDC to function
  contents: read

jobs:
  test-aws-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      # 1. Test GitHub -> Infisical OIDC
      - name: Fetch Pipeline Secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          oidc-audience: ${{ github.server_url }}/${{ github.repository }}
          identity-id: ${{ vars.IDENTITY_ID }}
          env-slug: "prod"
          project-slug: "pipeline-secret-store"
          secret-path: "/bounty-infra"

      - name: Verify Infisical Secrets Injection
        run: |
          echo "Verifying AWS_REGION..."
          if [ -z "${{ env.AWS_REGION }}" ]; then
            echo "❌ AWS_REGION is empty! Infisical did not inject it."
          else
            echo "✅ AWS_REGION is set to: ${{ env.AWS_REGION }}"
          fi

          echo "Verifying AWS_OIDC_ROLE_ARN..."
          if [ -z "${{ env.AWS_OIDC_ROLE_ARN }}" ]; then
            echo "❌ AWS_OIDC_ROLE_ARN is empty! Infisical did not inject it."
          else
            echo "✅ AWS_OIDC_ROLE_ARN is populated."
            # We print just the first 15 characters to verify it looks like an ARN without exposing the whole string
            echo "Value starts with: ${AWS_OIDC_ROLE_ARN:0:15}..."
          fi

      # 2. Test GitHub/Infisical -> AWS OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Verify the AWS Identity
      - name: Verify AWS Connection
        run: |
          echo "Successfully authenticated!"
          aws sts get-caller-identity
