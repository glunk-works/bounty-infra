name: "Continuous Integration"

# T3(a): NO `paths:` filter. A required check on a path-filtered workflow
# deadlocks — a PR touching only docs/ would never trigger this workflow, so
# the required check sits pending forever and the PR can never merge. Runs on
# every PR; jobs with nothing relevant to a given change still report a
# conclusion (they just do near-nothing), which is what keeps required checks
# from stranding.
#
# T3(b): job ids ARE the required-check contexts — no `name:` override on any
# job below. Renaming a job here silently un-requires the check it backs.

on:
  pull_request:

# SG: narrowest workflow-wide default (CLAUDE.md § *Local: GitHub Actions security*).
# Every job below only reads the repo — none calls the GitHub API, pushes, or
# comments — so `contents: read` is the whole requirement, and setting it here means
# a job added later starts locked-down rather than inheriting the permissive default.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.11" }
      - run: pip install hatch
      - name: Ruff + bandit
        run: hatch run lint:check

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.11" }
      - run: pip install hatch
      - name: Pytest
        run: hatch run test:run

  package:
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.14" }
      - run: pip install hatch
      - name: Hatch Build Wheel
        run: hatch build
      - name: Verify Distribution
        run: |
          pip install dist/*.whl
          python -c "import bounty_scanner.scanner; print('Build verified successfully')"

  # T3(c): credential-free — `-backend=false` needs no AWS/Infisical access, so
  # this runs on every PR (including forks), unlike T2's `tofu-plan`, which
  # holds real (read-only) credentials.
  tofu-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
      - name: tofu fmt
        run: tofu fmt -check -recursive
      - name: tofu validate
        run: |
          set -euo pipefail
          tofu init -backend=false
          tofu validate
      - name: Setup tflint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: v0.64.0
      - name: tflint
        run: tflint --recursive

  # SG: CVE audit of the scanner's dependency closure. Runs unchained and in
  # parallel with lint/test — no `needs:`, because a required check should report
  # its own conclusion as fast as it can rather than inherit an upstream failure,
  # and nothing here depends on lint or test having passed.
  dependency-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.11" }
      - run: pip install hatch
      - name: pip-audit
        run: hatch run audit:run

  # SG: CycloneDX SBOM. The artifact is deliberately safe to publish on a public
  # repo — it enumerates this project's own third-party Python dependencies, which
  # are already public in `pyproject.toml`. It carries none of BI-D4's restricted
  # classes: no account identifiers, no findings, no scope/RoE data.
  sbom:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.11" }
      - run: pip install hatch
      - name: Generate SBOM
        run: hatch run sbom:run
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: src/sbom.json

  # SG: workflow security scanner. Catches the injection class that was #6/T4 and
  # the artipacked/unpinned-uses classes fixed alongside it in this same change —
  # this is what turns "fixed once" into "can't regress." Runs unchained, like the
  # other SG additions.
  #
  # `security-events: write` is job-scoped, not added to the workflow-wide
  # `permissions:` block above — it is the one job here that needs it (to upload
  # SARIF to the Security tab; public repos get GitHub Advanced Security free),
  # every other job stays at the workflow default of `contents: read`.
  #
  # zizmor-action always propagates zizmor's own exit code (verified by reading
  # its action.sh, not assumed from its README): a High-confidence finding fails
  # this job the same way a failing test fails `test`. The SARIF upload is an
  # additional convenience, not a substitute for that.
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
