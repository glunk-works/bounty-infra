name: "Continuous Integration"

on:
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/ci.yml'

jobs:
  validate:
    name: "Lint & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
        
      - run: pip install hatch
      - run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade hatchling
      - name: Hatch Quality Gates
        run: |
          hatch run lint:check
          hatch run test:run

  package:
    name: "Hatch Build & Validate"
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install hatch
      - name: Hatch Build Wheel
        run: hatch build
      - name: Verify Distribution
        run: |
          # Ensure the wheel is generated and installable
          pip install dist/*.whl
          python -c "import scanner; print('Build verified successfully')"