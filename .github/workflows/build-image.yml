name: "1b. Build & Push Image"

# T3(d): the missing half of #8. Before this, a merge to main pushed `:latest`
# to a MUTABLE ECR repo and the task definition ran `…:latest` — no CI
# dependency, so merging any src/** change silently replaced the code running
# in production Fargate. Two fixes, both below:
#
# - The CI gate is structural, not a `needs:`/`workflow_run` dependency on
#   ci.yml. ci.yml runs on `pull_request`; this workflow runs on `push` to
#   main, which the `protected-integration-branches` ruleset only allows via a
#   merged PR whose `lint`/`test`/`tofu-validate` checks are required and
#   green (see ruleset-drift.yml, which watches that this stays true). By the
#   time this job sees a commit on main, CI already passed on it.
# - The image is pushed ONLY as `:${{ github.sha }}` — no `:latest` tag.
#
# SE (BI-D5, SE-MG3): this build path is now AWS-free. The image is public
# on GHCR — it carries no secrets (src/Dockerfile already is public), so a
# pull credential on the most disposable box (the per-scan Vultr VM) would
# protect nothing. No ECR login, no task-definition registration: the ECS
# task definition this workflow used to mutate directly is retired-in-place
# pending PR2; run-scan.yml (SE) reads an explicit `image_tag` input instead
# of any auto-updated "current" pointer.
#
# OPERATOR GATE, one-time: GHCR publishes a package PRIVATE on its first
# push, and no `docker/build-push-action` input can change that -- it's a
# package-settings action on github.com (org Packages -> bounty-scanner ->
# Package settings -> Change visibility -> Public), not something CI can do
# for itself. Until that flip happens, the credential-less `docker run` on
# the scan VM (run-scan.yml) cannot pull the image. Do it once, after the
# first push this workflow makes.

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: "Build and Push Container"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and Push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./src
          push: true
          # Sha-pinned only — no `:latest`. A mutable tag is what let a merge
          # silently swap the image an already-running task was built from;
          # a sha tag is a new, distinct reference every time.
          tags: ghcr.io/glunk-works/bounty-scanner:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
