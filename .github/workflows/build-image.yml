name: "1b. Build & Push Image"

# T3(d): the missing half of #8. Before this, a merge to main pushed `:latest`
# to a MUTABLE ECR repo and the task definition ran `…:latest` — no CI
# dependency, so merging any src/** change silently replaced the code running
# in production Fargate. Two fixes, both below:
#
# - The CI gate is structural, not a `needs:`/`workflow_run` dependency on
#   ci.yml. ci.yml runs on `pull_request`; this workflow runs on `push` to
#   main, which the `protected-integration-branches` ruleset only allows via a
#   merged PR whose `lint`/`test`/`tofu-validate` checks are required and
#   green (see ruleset-drift.yml, which watches that this stays true). By the
#   time this job sees a commit on main, CI already passed on it.
# - The image is pushed ONLY as `:${{ github.sha }}` — no `:latest` tag — and
#   a new ECS task-definition revision is registered directly with that
#   image, so what actually runs is traceable to the commit that built it.
#   This bypasses Tofu on purpose: infra/main.tf's task definition carries
#   `lifecycle.ignore_changes = [container_definitions]` so the two don't
#   fight over this field on the next unrelated `tofu apply`.

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: "Build and Push Container"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Fetch Pipeline Secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ vars.IDENTITY_ID }}
          oidc-audience: ${{ github.server_url }}/${{ github.repository }}
          env-slug: "prod"
          project-slug: "pipeline-secret-store"
          secret-path: "/bounty-infra"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu Core
        uses: opentofu/setup-opentofu@v2

      # We safely fetch the ECR URL from the existing state without running apply
      - name: Fetch ECR URL from State
        id: infra-outputs
        run: |
          tofu init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_STATE_LOCK_TABLE }}"
          
          echo "ECR_URL=$(tofu output -raw ecr_repository_url)" >> $GITHUB_ENV
        working-directory: ./infra

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./src
          push: true
          # Sha-pinned only — no `:latest`. Mutable tags are what let a merge
          # silently swap the image an already-running task definition points
          # at; a sha tag is a new, distinct reference every time.
          tags: ${{ env.ECR_URL }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy sha-pinned image to ECS task definition
        env:
          IMAGE: ${{ env.ECR_URL }}:${{ github.sha }}
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition bounty-scanner-task \
            --query 'taskDefinition' \
            > current-task-def.json

          # register-task-definition only accepts the input fields — strip the
          # describe-only ones (arn, revision, status, registeredAt, ...) and
          # swap in the new image.
          jq --arg IMAGE "$IMAGE" '
            .containerDefinitions[0].image = $IMAGE
            | {
                family, taskRoleArn, executionRoleArn, networkMode,
                containerDefinitions, volumes, placementConstraints,
                requiresCompatibilities, cpu, memory
              }
          ' current-task-def.json > new-task-def.json

          aws ecs register-task-definition --cli-input-json file://new-task-def.json

          rm -f current-task-def.json new-task-def.json