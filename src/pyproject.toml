[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bounty-scanner"
version = "0.1.0"
description = "Agentic Vulnerability Scanning Pipeline"
requires-python = ">=3.14"
dependencies = [
    "google-genai>=0.1.0",
    "pydantic>=2.0.0",
    "boto3>=1.34.0"
]

[tool.hatch.envs.default]
# Your production-like environment (used by the Dockerfile)
dependencies = []

[tool.hatch.envs.lint]
# Environment for Ruff and Bandit
dependencies = [
    "ruff",
    "bandit",
]
[tool.hatch.envs.lint.scripts]
check = [
    "ruff check .",
    "ruff format --check .",
    "bandit -r src/"
]
fmt = [
    "ruff format .",
    "ruff check --fix .",
]

[tool.hatch.envs.test]
# Environment for Pytest
dependencies = [
    "pytest",
    "pytest-mock",
]
[tool.hatch.envs.test.scripts]
run = "pytest tests/"