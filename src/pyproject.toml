[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bounty-scanner"
version = "0.1.0"
description = "Agentic Vulnerability Scanning Pipeline"
requires-python = ">=3.11"
dependencies = [
    "google-genai>=0.1.0",
    "pydantic>=2.0.0",
    "boto3>=1.34.0"
]

[tool.hatch.build.targets.wheel]
# Tells hatchling to bundle our single standalone script
packages = ["scanner.py"]